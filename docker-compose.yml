version: "3.9"

services:

  db:
    image: postgres:16
    container_name: perazzo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: perazzo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d perazzo_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: perazzo_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
