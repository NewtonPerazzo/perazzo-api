version: "3.9"

services:

  db:
    image: postgres:16
    container_name: perazzo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: perazzo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: perazzo_api
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env.docker
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data: