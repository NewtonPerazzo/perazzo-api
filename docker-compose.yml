services:

  db:
    image: postgres:16
    container_name: perazzo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: perazzo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d perazzo_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: perazzo_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  manager:
    build:
      context: ../perazzo-manager
    container_name: perazzo_manager
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PERAZZO_INTERNAL_API_URL: http://api:8000/api/v1
      NEXT_PUBLIC_PERAZZO_API_URL: http://localhost:8001/api/v1
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ../perazzo-manager:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev -- --hostname 0.0.0.0

volumes:
  postgres_data:
